services:
  traefik:
    image: traefik:v3
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
    networks:
      - platform-net

  web:
    build:
      context: ../platform-web
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    ports:
      - "3000:3000"
    volumes:
      - ../platform-web:/app
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - "traefik.http.routers.web.rule=Host(`localhost`) && !PathPrefix(`/api`)"
      - traefik.http.services.web.loadbalancer.server.port=3000
      # HMR (WebSocket) support
      - traefik.http.middlewares.web-headers.headers.customrequestheaders.X-Forwarded-Proto=http
      - traefik.http.routers.web.middlewares=web-headers
    networks:
      - platform-net

  api:
    build:
      context: ../platform-api
      dockerfile: Dockerfile.dev
    environment:
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
      NOTION_ENCRYPTION_KEY: ${NOTION_ENCRYPTION_KEY}
      NOTION_OAUTH_CLIENT_ID: ${NOTION_OAUTH_CLIENT_ID}
      NOTION_OAUTH_REDIRECT_URI: ${NOTION_OAUTH_REDIRECT_URI}
      NOTION_OAUTH_CLIENT_SECRET: ${NOTION_OAUTH_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      SHUTDOWN_TIMEOUT: 10000
      REDIS_URL: ${REDIS_URL}
      ALLOW_ORIGIN: ${ALLOW_ORIGIN}
      API_PORT: ${API_PORT}
      APP_URL: ${APP_URL}
    ports:
      - "4000:4000"
    volumes:
      - ../platform-api:/app
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - traefik.http.services.api.loadbalancer.server.port=4000
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge

volumes:
  redisdata:
